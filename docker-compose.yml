services:
  mysql:
    image: mysql:8.4
    container_name: member-services-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: member_services
      MYSQL_USER: member_app
      MYSQL_PASSWORD: member_app_password
    ports:
      - "3307:3306"
    volumes:
      - member_services_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  member_services_mysql:
